{% extends 'core/base.html' %}
{% block titulo %}Início{% endblock %}

{% block estilo %}
<style>
  main.inicio { grid-template-columns: 1fr; max-width: 520px; }
  .inicio h2 { font-size: 1.4rem; text-transform: none; letter-spacing: 0; color: #222; }
  .inicio .quem { margin: .4rem 0 0; font-size: 1.05rem; }
  .inicio .dica { margin-top: 1rem; color: #666; }
</style>
{% endblock %}

{% block conteudo %}
<main class="inicio">
  <section>
    <h2>Bem-vindo ao Mercado</h2>
    <p class="quem">Você entrou como <strong>{{ user.username }}</strong> ({{ perfil_nome }}).</p>
    <p class="dica">Use o menu acima para navegar.</p>
  </section>
</main>
{% endblock %}
